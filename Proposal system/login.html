<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure login for Sale by Design Homes Proposal Builder.">
  <title>Login | Sale by Design Homes Portal</title>
  <link rel="shortcut icon" href="/images/logo.svg">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">
      <div style="margin-bottom: 24px;">
        <img src="/images/logo.svg" alt="Sale by Design Homes Logo" style="width: 100%; max-width: 280px; height: auto;">
      </div>
      <div class="login-subtitle">Proposal Portal</div>
      
      <div id="error-banner" class="error-message"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Email Address</label>
          <input type="email" id="username" class="form-control" placeholder="Enter email" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
        </div>
        
        <button type="submit" id="submit-btn" class="btn btn-primary login-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner" style="display: none;"></span>
        </button>
      </form>
      
      <div style="margin-top: 30px; font-size: 0.75rem; color: var(--text-muted); text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <p>Demo Login Credentials:</p>
        <code style="display: inline-block; background-color: var(--bg-primary); padding: 4px 8px; border-radius: 4px; margin-top: 5px; color: var(--accent-gold-dark); font-weight: 600;">admin@salesbydesign.com / admin123</code>
      </div>
    </div>
  </div>

  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/js/firebase-init.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
